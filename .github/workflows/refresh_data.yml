name: Refresh ScoutIQ data

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC daily (~5 AM ET)
  workflow_dispatch:        # manual trigger from the Actions UI
    inputs:
      season:
        description: "Season year to refresh (default: current year)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run refresh
        run: |
          if [ -n "${{ inputs.season }}" ]; then
            python scripts/refresh_data.py --season ${{ inputs.season }}
          else
            python scripts/refresh_data.py
          fi

      - name: Commit & push if data changed
        run: |
          git config user.name  "scoutiq-bot"
          git config user.email "scoutiq-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: nightly refresh $(date -u +%Y-%m-%d)"
            git push
          fi
